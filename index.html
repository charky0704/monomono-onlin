<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>MONOMONO ONLINE - Ver.8.2 Boss Update</title>
    <style>
        :root { --main-bg: #1a1a2e; --panel: rgba(20,20,40,0.95); --accent: #ffce00; --xp-color: #2ecc71; --boss-color: #e74c3c; }
        body { background: var(--main-bg); color: white; font-family: sans-serif; margin: 0; padding: 10px; display: flex; justify-content: center; height: 100vh; overflow: hidden; }
        .game-container { display: flex; width: 100%; max-width: 1100px; gap: 15px; height: 95vh; }
        .side-panel, .main-panel { background: var(--panel); border: 2px solid #333; border-radius: 15px; padding: 15px; overflow-y: auto; }
        .side-panel { flex: 1; min-width: 280px; border-color: var(--accent); }
        .main-panel { flex: 2; position: relative; }
        .btn { width: 100%; padding: 12px; margin: 5px 0; background: #333; color: white; border: 1px solid #555; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn:hover:not(:disabled) { background: #555; transform: scale(1.02); }
        .btn-boss { background: linear-gradient(45deg, #800, #e22); border: 2px solid #ffce00; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.03); } 100% { transform: scale(1); } }
        .bar-bg { width: 100%; height: 12px; background: #300; border-radius: 6px; overflow: hidden; border: 1px solid #777; margin: 4px 0; }
        .hp-fill { height: 100%; background: linear-gradient(90deg, #ff4757, #ff6b81); width: 100%; transition: 0.3s; }
        .xp-fill { height: 100%; background: var(--xp-color); width: 0%; transition: 0.5s; }
        .ex-fill { height: 100%; background: #3498db; width: 0%; transition: 0.5s; }
        #battle-log { height: 160px; background: #000; padding: 10px; font-size: 13px; overflow-y: auto; border-radius: 10px; border: 1px solid #444; margin-top:10px; }
        .hidden { display: none !important; }
        .pixel-img { width: 80px; height: 80px; object-fit: contain; image-rendering: pixelated; border: 2px solid var(--accent); background: #000; border-radius: 10px; }
        .bp-row { display: flex; justify-content: space-between; align-items: center; background: rgba(255,255,255,0.05); margin: 4px 0; padding: 8px; border-radius: 8px; }
    </style>
</head>
<body>

<div class="game-container">
    <div class="side-panel">
        <div id="side-img-view" style="text-align:center;">👤</div>
        <div id="disp-name" style="text-align:center; font-size:20px; font-weight:bold;">ゲスト</div>
        <div id="disp-level" style="text-align:center; font-size:14px; color:var(--accent);">Lv.-- 職業</div>
        <div style="margin-top:10px;">
            <div style="font-size:10px;">HP <span id="hp-text">--/--</span></div>
            <div class="bar-bg"><div id="p-hp-bar" class="hp-fill"></div></div>
            <div style="font-size:10px;">EXP <span id="xp-text">--</span></div>
            <div class="bar-bg"><div id="p-xp-bar" class="xp-fill"></div></div>
            <div style="font-size:10px;">AREA EXPLORE <span id="ex-text">0%</span></div>
            <div class="bar-bg"><div id="p-ex-bar" class="ex-fill"></div></div>
        </div>
        <div id="stat-list" style="display:grid; grid-template-columns:1fr 1fr; gap:5px; font-size:11px; margin-top:15px; background:rgba(0,0,0,0.3); padding:8px;"></div>
        <div id="gold-disp" style="text-align:center; color:#f1c40f; font-size:18px; font-weight:bold; margin-top:10px;">0 G</div>
    </div>

    <div class="main-panel">
        <div id="login-ui">
            <h2>🌍 MONOMONO ONLINE</h2>
            <input type="text" id="login-id" placeholder="名前を入力" style="width:90%; padding:12px;">
            <input type="file" id="img-upload" style="margin-top:10px;">
            <button class="btn" onclick="auth()">ログイン</button>
        </div>

        <div id="job-ui" class="hidden"><h3>職業選択</h3><div id="job-btns"></div></div>

        <div id="point-ui" class="hidden">
            <h3>能力強化 (BP:<span id="bp-val">0</span>)</h3>
            <div id="point-config"></div>
            <button class="btn" onclick="saveAndGoMenu()">確定</button>
        </div>

        <div id="menu-ui" class="hidden">
            <h2 id="floor-tag">第1階層</h2>
            <div id="normal-explore">
                <button class="btn" onclick="showSub('area-ui')" style="background:#27ae60;">⚔ エリア探索</button>
            </div>
            <div id="boss-explore" class="hidden">
                <button class="btn btn-boss" onclick="startBossBattle()">👹 階層ボスに挑む！</button>
            </div>
            <button class="btn" onclick="showSub('tower-ui')">🗼 試練の塔</button>
            <button class="btn" onclick="location.reload()" style="font-size:10px;">タイトルへ</button>
        </div>

        <div id="area-ui" class="hidden">
            <h3>探索エリア</h3>
            <div id="area-list"></div>
            <button class="btn" onclick="showSub('menu-ui')">戻る</button>
        </div>

        <div id="battle-ui" class="hidden">
            <div id="boss-warning" style="color:red; text-align:center; font-weight:bold; display:none;">⚠️ BOSS BATTLE ⚠️</div>
            <div style="display:flex; justify-content:space-around; align-items:center; background:rgba(0,0,0,0.6); padding:15px; border-radius:15px;">
                <div id="p-battle-img"></div>
                <div style="color:#ff4757; font-weight:bold; font-size:24px;">VS</div>
                <div style="text-align:center;">
                    <div id="e-icon" style="font-size:50px;">👿</div>
                    <div class="bar-bg" style="width:80px;"><div id="e-b-hp" class="hp-fill"></div></div>
                </div>
            </div>
            <div id="battle-log"></div>
        </div>

        <div id="tower-ui" class="hidden"><h3>Tower</h3><button class="btn" onclick="showSub('menu-ui')">戻る</button></div>
    </div>
</div>

<script>
const JOB_DATA = {
    "剣士": {hp:15, atk:15, def:10, spd:12},
    "大盾使い": {hp:32, atk:7, def:22, spd:4},
    "弓使い": {hp:13, atk:11, def:7, spd:26, crit:0.35},
    "魔導士": {hp:11, atk:5, matk:23, def:6, spd:11, magic:true},
    "戦士": {hp:24, atk:19, def:13, spd:6}
};

const BOSS_DATA = [
    { n: "草原の覇者 ギガ・スライム", i: "👑", hp: 300, atk: 25, exp: 200 },
    { n: "古の守護獣 大樹王", i: "🌳", hp: 600, atk: 45, exp: 500 },
    { n: "深淵の龍 ゴッド・モノ", i: "🐉", hp: 1200, atk: 80, exp: 1000 }
];

const WORLD_AREAS = [
    { name: "静かな草原", icon: "🌱", monsters: [{n:"スライム", i:"💧", hp:40, atk:8, exp:30}] },
    { name: "迷いの森", icon: "🌳", monsters: [{n:"ウルフ", i:"🐺", hp:75, atk:16, exp:65}] }
];

let p = null, curHp = 0, userImg = "👤", bLoop = null, isBoss = false;

function auth() {
    const id = document.getElementById('login-id').value;
    if(!id) return alert("名前を入力！");
    const saved = localStorage.getItem('mono_v8_save_' + id);
    if(saved) { p = JSON.parse(saved); userImg = p.img; completeLoad(); }
    else {
        if(userImg === "👤") return alert("画像を選んで！");
        p = { name: id, job:"", lv:1, exp:0, gold:0, bp:15, stats:{}, floor:1, explore:0, tower:0, img:userImg };
        showSub('job-ui');
        document.getElementById('job-btns').innerHTML = Object.keys(JOB_DATA).map(j => `<button class="btn" onclick="setJob('${j}')">${j}</button>`).join('');
    }
}

function setJob(j) { p.job = j; p.stats = {...JOB_DATA[j]}; showSub('point-ui'); renderPoints(); }
function renderPoints() {
    document.getElementById('point-config').innerHTML = Object.keys(p.stats).map(k => `
        <div class="bp-row"><span>${k.toUpperCase()}: ${p.stats[k]}</span>
        <button onclick="adjStat('${k}')" style="width:40px;">+</button></div>`).join('');
    document.getElementById('bp-val').innerText = p.bp;
}
function adjStat(k) { if(p.bp > 0) { p.stats[k]++; p.bp--; renderPoints(); } }

function completeLoad() { curHp = p.stats.hp * 5; updateUI(); showSub('menu-ui'); }
function saveAndGoMenu() { localStorage.setItem('mono_v8_save_' + p.name, JSON.stringify(p)); completeLoad(); }

function updateUI() {
    if(!p) return;
    const maxP = p.stats.hp * 5;
    document.getElementById('hp-text').innerText = `${curHp}/${maxP}`;
    document.getElementById('p-hp-bar').style.width = (curHp/maxP*100) + "%";
    document.getElementById('xp-text').innerText = `Lv.${p.lv} (${p.exp}/${p.lv*100})`;
    document.getElementById('p-xp-bar').style.width = (p.exp/(p.lv*100)*100) + "%";
    document.getElementById('ex-text').innerText = p.explore + "%";
    document.getElementById('p-ex-bar').style.width = p.explore + "%";
    document.getElementById('floor-tag').innerText = `第${p.floor}階層`;
    document.getElementById('side-img-view').innerHTML = `<img src="${p.img}" class="pixel-img">`;
    document.getElementById('stat-list').innerHTML = Object.keys(p.stats).map(k => `<div>${k.toUpperCase()}: ${p.stats[k]}</div>`).join('');
    document.getElementById('gold-disp').innerText = `${p.gold} G`;

    // ボス出現判定
    if(p.explore >= 100) {
        document.getElementById('normal-explore').classList.add('hidden');
        document.getElementById('boss-explore').classList.remove('hidden');
    } else {
        document.getElementById('normal-explore').classList.remove('hidden');
        document.getElementById('boss-explore').classList.add('hidden');
    }
}

function startBattle(e, boss = false) {
    isBoss = boss;
    showSub('battle-ui');
    document.getElementById('boss-warning').style.display = isBoss ? 'block' : 'none';
    const log = document.getElementById('battle-log');
    log.innerHTML = `<div><b>${e.en}</b> が現れた！</div>`;
    let mE = e.hp, cE = e.hp;
    document.getElementById('p-battle-img').innerHTML = `<img src="${p.img}" class="pixel-img">`;
    document.getElementById('e-icon').innerText = e.i;

    bLoop = setInterval(() => {
        let dmg = Math.max(1, (p.stats.magic ? p.stats.matk : p.stats.atk) - Math.floor(p.floor/2));
        if(p.stats.crit && Math.random() < p.stats.crit) { dmg *= 2; log.innerHTML += `<div style="color:yellow;">★CRITICAL!</div>`; }
        cE -= dmg; log.innerHTML += `<div>⚔ ${p.name}: ${dmg}ダメ</div>`;
        if(cE <= 0) { clearInterval(bLoop); finishBattle(true, e); }
        else {
            let eDmg = Math.max(1, e.atk - Math.floor(p.stats.def / 2));
            curHp -= eDmg; log.innerHTML += `<div style="color:red;">💥 敵: ${eDmg}ダメ</div>`;
            if(curHp <= 0) { clearInterval(bLoop); finishBattle(false, e); }
        }
        document.getElementById('e-b-hp').style.width = (cE/mE*100) + "%";
        updateUI();
        log.scrollTop = log.scrollHeight;
    }, 800);
}

function startBossBattle() {
    const b = BOSS_DATA[p.floor - 1] || BOSS_DATA[BOSS_DATA.length-1];
    startBattle({ en: b.n, i: b.i, hp: b.hp, atk: b.atk, exp: b.exp }, true);
}

function finishBattle(win, e) {
    if(win) {
        p.exp += e.exp; p.gold += e.exp;
        if(isBoss) {
            alert("階層ボス撃破！ 次の階層へ進めるようになった！");
            p.floor++; p.explore = 0;
        } else {
            p.explore = Math.min(100, p.explore + 25);
        }
        if(p.exp >= p.lv * 100) {
            p.exp = 0; p.lv++; p.bp += 5; alert("Lv Up!"); showSub('point-ui'); renderPoints();
        } else { saveAndGoMenu(); }
    } else {
        alert("敗北..."); curHp = p.stats.hp * 5; saveAndGoMenu();
    }
}

function showSub(id) {
    const ids = ["login-ui", "job-ui", "point-ui", "menu-ui", "area-ui", "battle-ui", "tower-ui"];
    ids.forEach(i => document.getElementById(i).classList.add('hidden'));
    document.getElementById(id).classList.remove('hidden');
    if(id === 'area-ui') renderAreaList();
}

function renderAreaList() {
    document.getElementById('area-list').innerHTML = WORLD_AREAS.map(a => `
        <div style="border:1px solid #555; padding:10px; margin:5px 0;">
            <b>${a.icon} ${a.name}</b><br><button class="btn" onclick="encount('${a.name}')">探索</button>
        </div>`).join('');
}

function encount(name) {
    const area = WORLD_AREAS.find(a => a.name === name);
    const mon = area.monsters[0];
    startBattle({ en: mon.n, i: mon.i, hp: mon.hp + (p.floor*10), atk: mon.atk + (p.floor*2), exp: mon.exp });
}

document.getElementById('img-upload').onchange = (e) => {
    const r = new FileReader(); r.onload = (ev) => { userImg = ev.target.result; }; r.readAsDataURL(e.target.files[0]);
};
</script>
</body>
</html>
