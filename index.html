<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>MONOMONO ONLINE</title>
<style>
.screen { display: none; width:100%; height:100vh; display:flex; justify-content:center; align-items:center; flex-direction:column; }
.screen.active { display: flex; }
button { padding: 10px 20px; margin: 5px; cursor: pointer; }
</style>
</head>
<body>

<!-- START画面 -->
<div id="start" class="screen">
  <h1>MONOMONO ONLINE</h1>
  <button onclick="goCreate()">NEW GAME</button>
  <button onclick="loadGame()">CONTINUE</button>
</div>

<!-- キャラ作成 -->
<div id="create" class="screen hidden">
  <h2>CREATE CHARACTER</h2>
  <input id="name" placeholder="NAME"><br><br>
  <input type="file" id="img"><br><br>
  <button onclick="createPlayer()">START</button>
</div>

<!-- メニュー画面 -->
<div id="menu" class="screen">
  <h2>MENU</h2>
  <div id="status"></div>
  <button onclick="exploreArea()">探索する</button>
  <button onclick="saveGame()">セーブ</button>
  <button onclick="logout()">ログアウト</button>
</div>

<script src="game.js"></script>
</body>
</html>
