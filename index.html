<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>MONOMONO ONLINE</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- START画面 -->
<div id="start" class="screen">
<h1>MONOMONO ONLINE</h1>
<button onclick="goCreate()">NEW GAME</button>
<button onclick="loadGame()">CONTINUE</button>
</div>

<!-- キャラ作成 -->
<div id="create" class="screen hidden">
<h2>CREATE CHARACTER</h2>

<input id="name" placeholder="NAME"><br><br>
<input type="file" id="img"><br><br>

<button onclick="createPlayer()">START</button>
</div>

<!-- メニュー -->
<div id="menu" class="screen hidden">

<h2>MENU</h2>

<div id="status"></div>

<button onclick="explore()">EXPLORE</button>
<button onclick="saveGame()">SAVE</button>
<button onclick="logout()">LOGOUT</button>

</div>

<!-- 戦闘 -->
<div id="battle" class="screen hidden">

<div id="battleTop">

<div class="unit">
<img id="pimg" width="80">
<div id="pname"></div>
<div class="bar"><div id="php" class="hp"></div></div>
</div>

<div class="vs">VS</div>

<div class="unit">
<div id="ename"></div>
<div class="bar"><div id="ehp" class="hp"></div></div>
</div>

</div>

<div id="log"></div>

</div>

<!-- JS読み込み（超重要順番） -->
<script src="data.js"></script>
<script src="game.js"></script>
<script src="battle.js"></script>

</body>
</html>

<button onclick="startTower()">TOWER</button>
