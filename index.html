<div class="maker">
    <div>名前: <input type="text" id="name-input" value="ユウシャ" oninput="updateName()"></div>
    <div>画像を選択: 
        <input type="file" id="char-upload" accept="image/*" onchange="loadCharacter(event)">
    </div>
    <div style="font-size: 10px; color: #ccc;">※背景が透明なPNG画像を推奨</div>
</div>

<div id="player-view" class="char-preview">
    <div id="aura-part" class="part" style="font-size: 80px; opacity: 0.5;"></div>
    <div id="body-part" class="part">
        <img id="player-img" src="" style="display:none;" class="pixel-img">
        <span id="default-icon">⚔️</span> </div>
</div>

<style>
    /* ドット絵をくっきりさせるCSS設定 */
    .pixel-img {
        width: 80px;  /* お好みのサイズに */
        height: auto;
        image-rendering: pixelated;
        image-rendering: -moz-crisp-edges;
    }
</style>

<script>
    function loadCharacter(event) {
        const file = event.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(e) {
            const imgEl = document.getElementById('player-img');
            const defaultIcon = document.getElementById('default-icon');

            // 読み込んだ画像をsrcにセット
            imgEl.src = e.target.result;
            imgEl.style.display = "block"; // 画像を表示
            defaultIcon.style.display = "none"; // 絵文字を隠す
            
            document.getElementById('log').innerText = "新しい姿になった！";
        };
        reader.readAsDataURL(file);
    }
</script>
