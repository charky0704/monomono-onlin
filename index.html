<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>モノモノ オンライン</title>
    <style>
        :root { 
            /* 背景：明るい空から大地（緑）へのグラデーション */
            --main-bg: linear-gradient(180deg, #4facfe 0%, #70a1ff 40%, #27ae60 100%);
            --panel-bg: rgba(20, 20, 20, 0.75); 
            --accent: #ffce00; 
            --text-shadow: 1px 1px 3px #000;
        }
        
        body { 
            background: var(--main-bg); 
            background-attachment: fixed; 
            color: white; 
            font-family: 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif; 
            margin: 0; 
            padding: 10px; 
            display: flex; 
            justify-content: center; 
            height: 100vh; 
            overflow: hidden; 
        }

        .game-container { display: flex; flex-direction: row; width: 100%; max-width: 950px; gap: 15px; height: 90vh; }

        .side-panel, .main-panel { 
            background: var(--panel-bg); 
            border: 1px solid rgba(255, 255, 255, 0.3); 
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(8px); 
            padding: 20px; 
            overflow-y: auto;
        }

        .side-panel { flex: 1; display: flex; flex-direction: column; min-width: 250px; }
        .main-panel { flex: 2; display: flex; flex-direction: column; position: relative; }

        @media (max-width: 768px) { 
            .game-container { flex-direction: column; height: auto; overflow: visible; } 
            body { height: auto; overflow: auto; } 
            .side-panel, .main-panel { flex: none; width: auto; margin-bottom: 15px; }
        }

        h1 { 
            color: var(--accent); 
            font-size: 24px; 
            margin: 0 0 15px 0; 
            text-align: center; 
            text-shadow: var(--text-shadow);
            letter-spacing: 3px;
        }

        .pixel-img { 
            width: 120px; height: 120px; 
            object-fit: contain; 
            image-rendering: pixelated; 
            background: rgba(0,0,0,0.4); 
            border-radius: 15px;
            border: 2px solid var(--accent);
        }
        
        .btn { 
            width: 100%; padding: 14px; margin: 8px 0; 
            background: linear-gradient(to bottom, #555, #222);
            color: white; border: 1px solid #777; border-radius: 10px;
            cursor: pointer; font-size: 15px; font-weight: bold;
            transition: 0.2s;
        }
        .btn:hover:not(:disabled) { transform: translateY(-2px); background: #666; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        .btn:disabled { opacity: 0.3; cursor: not-allowed; }

        .hp-bar-bg { width: 100%; height: 18px; background: #300; border: 1px solid #aaa; border-radius: 9px; margin: 10px 0; overflow: hidden; position: relative; }
        .hp-bar-fill { height: 100%; background: linear-gradient(90deg, #ff4757, #ff6b81); width: 100%; transition: width 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }

        #battle-log { 
            flex-grow: 1; border-radius: 12px; border: 1px solid rgba(255,255,255,0.2); 
            padding: 12px; font-size: 14px; overflow-y: auto; 
            background: rgba(0,0,0,0.5); color: #fff; margin-top: 15px; 
            min-height: 180px; display: flex; flex-direction: column-reverse; 
        }
        
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; font-size: 13px; margin-top: 20px; background: rgba(255,255,255,0.1); padding: 12px; border-radius: 10px; }
        .hidden { display: none !important; }

        input[type="text"] { width: 90%; padding: 14px; background: rgba(0,0,0,0.6); color: #fff; border: 2px solid var(--accent); border-radius: 10px; margin-bottom: 20px; outline: none; font-size: 16px; }
    </style>
</head>
<body>

<div class="game-container">
    <div class="side-panel">
        <h1>MONOMONO</h1>
        <div id="side-img-view" style="text-align:center; min-height:120px;">👤</div>
        <div style="font-size:20px; font-weight:bold; margin-top:12px; text-align:center; text-shadow: var(--text-shadow);" id="disp-name">???</div>
        <div id="disp-job" style="font-size:14px; color:var(--accent); text-align:center; margin-bottom:12px;">冒険者</div>
        
        <div class="hp-bar-bg"><div id="p-hp-bar" class="hp-bar-fill"></div></div>
        <div id="hp-text" style="font-size:13px; text-align:center; font-weight:bold;">HP: -- / --</div>

        <div class="stat-grid" id="stat-list"></div>
        <div id="gold-display" style="margin-top:auto; color:#f1c40f; font-weight:bold; text-align:center; font-size:20px; text-shadow: 1px 1px 2px #000;">💰 500G</div>
    </div>

    <div class="main-panel">
        <div id="setup-ui">
            <h3>冒険の始まり</h3>
            <p>なまえを決めてね：</p>
            <input type="text" id="p-name-input" placeholder="ユウシャ" maxlength="8">
            <p>きみの姿を選んで（必須）：</p>
            <input type="file" accept="image/*" id="img-upload">
            <button class="btn" onclick="checkProfile()" style="background:var(--accent); color:#000; margin-top:30px; font-size:18px;">次へ進む ➔</button>
        </div>

        <div id="job-ui" class="hidden">
            <h3>職種を選択</h3>
            <div id="job-btns"></div>
        </div>

        <div id="point-ui" class="hidden">
            <h3>能力調整 (残りBP:<span id="bp">14</span>)</h3>
            <div id="point-config"></div>
            <button class="btn" id="confirm-btn" onclick="toMenu()" disabled style="background:var(--accent); color:#000;">冒険を開始！</button>
        </div>

        <div id="menu-ui" class="hidden">
            <button class="btn" style="background:linear-gradient(to bottom, #ff4757, #c0392b); height:90px; font-size:22px;" onclick="startBattle()">⚔ モンスター探索</button>
            <button class="btn" onclick="alert('ショップ店員「まだ品出し中なんだ、ごめんよ」')">🛒 武器屋（準備中）</button>
            <div id="log-area" style="margin-top:25px; font-size:15px; text-align:center; color:#eee; font-style:italic; text-shadow: 1px 1px 2px #000;">広大な大地がキミを待っている...</div>
        </div>

        <div id="battle-ui" class="hidden">
            <div style="display:flex; justify-content:space-around; align-items:center; background:rgba(0,0,0,0.5); padding:25px; border-radius:15px; border:1px solid rgba(255,255,255,0.2);">
                <div id="p-battle-view">👤</div>
                <div style="font-size:28px; color:#ff4757; font-weight:bold; font-style:italic;">VS</div>
                <div>
                    <div class="hp-bar-bg" style="width:110px;"><div id="e-hp-bar" class="hp-bar-fill"></div></div>
                    <div id="e-view" style="font-size:55px;">💧</div>
                </div>
            </div>
            <div id="battle-log"></div>
        </div>
    </div>
</div>

<script>
const jobData = {
    "剣士": {hp:12, mp:5, atk:15, def:8, matk:5, mdef:8, spd:12, crit:0.2},
    "戦士": {hp:20, mp:3, atk:18, def:12, matk:2, mdef:5, spd:6, crit:0.05},
    "魔法使い": {hp:8, mp:25, atk:4, def:5, matk:20, mdef:15, spd:8, crit:0.05, magicType: true},
    "盗賊": {hp:10, mp:8, atk:10, def:6, matk:6, mdef:6, spd:20, crit:0.25},
    "弓使い": {hp:10, mp:10, atk:14, def:7, matk:5, mdef:7, spd:15, crit:0.2},
    "魔物使い": {hp:12, mp:15, atk:8, def:8, matk:8, mdef:8, spd:10, pet:true},
    "大盾使い": {hp:25, mp:5, atk:8, def:20, matk:2, mdef:12, spd:4, crit:0.02},
    "僧侶": {hp:15, mp:20, atk:6, def:10, matk:10, mdef:18, spd:8, crit:0.05, magicType: true}
};

let myStats = null, maxHP, curHP, points = 14, gold = 500, playerName = "", userImg = null;
const statNames = {hp:"体力", mp:"魔力", atk:"攻撃", def:"防御", matk:"魔攻", mdef:"魔防", spd:"速度"};

document.getElementById('img-upload').onchange = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
        userImg = ev.target.result;
        const imgTag = `<img src="${userImg}" class="pixel-img">`;
        document.getElementById('side-img-view').innerHTML = imgTag;
        document.getElementById('p-battle-view').innerHTML = imgTag;
    };
    reader.readAsDataURL(file);
};

function checkProfile() {
    playerName = document.getElementById('p-name-input').value.trim();
    if (!playerName || !userImg) return alert("名前と画像を設定してください！");
    document.getElementById('disp-name').innerText = playerName;
    showSub('job-ui');
    const jBox = document.getElementById('job-btns');
    jBox.innerHTML = "";
    Object.keys(jobData).forEach(j => {
        jBox.innerHTML += `<button class="btn" onclick="selectJob('${j}')">${j}</button>`;
    });
}

function selectJob(name) {
    myStats = {...jobData[name], job: name};
    showSub('point-ui');
    document.getElementById('disp-job').innerText = name;
    renderPoints();
    updateStatusDisplay();
}

function renderPoints() {
    const div = document.getElementById('point-config');
    div.innerHTML = "";
    Object.keys(statNames).forEach(k => {
        div.innerHTML += `<div style="display:flex; justify-content:space-between; align-items:center; margin:8px; background:rgba(255,255,255,0.1); padding:10px; border-radius:8px;">
            <span>${statNames[k]}: ${myStats[k]}</span>
            <button class="btn" style="width:50px; margin:0; padding:5px;" onclick="addPoint('${k}')">+</button>
        </div>`;
    });
}

function addPoint(k) {
    if (points > 0) {
        myStats[k]++; points--;
        document.getElementById('bp').innerText = points;
        renderPoints();
        updateStatusDisplay();
        if (points === 0) document.getElementById('confirm-btn').disabled = false;
    }
}

function updateStatusDisplay() {
    const list = document.getElementById('stat-list');
    list.innerHTML = "";
    Object.keys(statNames).forEach(k => { list.innerHTML += `<div>${statNames[k]}: ${myStats[k]}</div>`; });
    if (myStats.job) {
        maxHP = myStats.hp * 5;
        if (curHP === undefined) curHP = maxHP;
        document.getElementById('hp-text').innerText = `HP: ${curHP} / ${maxHP}`;
        document.getElementById('p-hp-bar').style.width = Math.max(0, (curHP/maxHP*100)) + "%";
    }
    document.getElementById('gold-display').innerText = `💰 ${gold}G`;
}

function toMenu() { showSub('menu-ui'); }

function showSub(id) {
    ["setup-ui", "job-ui", "point-ui", "menu-ui", "battle-ui"].forEach(s => document.getElementById(s).classList.add('hidden'));
    document.getElementById(id).classList.remove('hidden');
}

function startBattle() {
    showSub('battle-ui');
    const log = document.getElementById('battle-log');
    log.innerHTML = "<div style='color:#ffce00'>スライムが飛び出してきた！</div>";
    let enemy = { name: "スライム", hp: 60, max: 60, atk: 15, matk: 5, def: 5, mdef: 5, spd: 8 };
    document.getElementById('e-hp-bar').style.width = "100%";
    
    const battleInterval = setInterval(() => {
        const executeAction = (isPlayer) => {
            if (curHP <= 0 || enemy.hp <= 0) return true;
            if (isPlayer) {
                if (pAtk(enemy, log)) { finish(battleInterval, true); return true; }
            } else {
                if (eAtk(enemy, log)) { finish(battleInterval, false); return true; }
            }
            return false;
        };

        if (myStats.spd >= enemy.spd) {
            if (executeAction(true)) return;
            setTimeout(() => { if (enemy.hp > 0) executeAction(false); }, 700);
        } else {
            if (executeAction(false)) return;
            setTimeout(() => { if (curHP > 0) executeAction(true); }, 700);
        }
    }, 1800);
}

function pAtk(e, log) {
    let dmg, msg, isCrit = Math.random() < myStats.crit;
    const useMagic = myStats.magicType || (Math.random() < (myStats.mp / 50));
    if (useMagic) {
        dmg = Math.max(1, Math.floor(myStats.matk * (isCrit?1.5:1) - (e.mdef/2)));
        msg = `✨ ${playerName}の魔法！ ${dmg}ダメージ！`;
    } else {
        dmg = Math.max(1, Math.floor(myStats.atk * (isCrit?2:1) - (e.def/2)));
        msg = `⚔ ${playerName}の攻撃！ ${dmg}ダメージ！${isCrit?'★':''}`;
    }
    e.hp = Math.max(0, e.hp - dmg);
    document.getElementById('e-hp-bar').style.width = (e.hp/e.max*100) + "%";
    log.innerHTML += `<div>${msg}</div>`;
    return e.hp <= 0;
}

function eAtk(e, log) {
    if (Math.random() < (myStats.spd - e.spd) * 0.05) {
        log.innerHTML += `<div style="color:cyan;">💨 攻撃を回避！</div>`; return false;
    }
    let d = Math.max(1, Math.floor(e.atk - (myStats.def/3)));
    curHP = Math.max(0, curHP - d);
    updateStatusDisplay();
    log.innerHTML += `<div style="color:#ff6b81;">💥 敵の反撃！ ${d}ダメージ！</div>`;
    return curHP <= 0;
}

function finish(id, win) {
    clearInterval(id);
    setTimeout(() => {
        if (win) {
            alert("VICTORY! 150G獲得"); gold += 150;
        } else {
            alert("敗北…。所持金が減り、村へ運ばれました。");
            gold = Math.floor(gold * 0.7);
            curHP = maxHP;
        }
        updateStatusDisplay();
        showSub('menu-ui');
    }, 800);
}
</script>
</body>
</html>
