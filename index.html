<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>MONOMONO RPG</title>

<style>
body{
margin:0;
font-family:sans-serif;
background:#cfe9ff;
}

.hidden{display:none}

#screen{
width:1000px;
margin:auto;
padding:10px;
}

/* HPバー */
.bar{
width:200px;
height:12px;
background:#333;
}
.hp{
height:12px;
background:lime;
}

/* 戦闘UI */
.battle{
display:flex;
justify-content:space-between;
padding:20px;
}

.char{
text-align:center;
}

.log{
background:#111;
color:#0f0;
height:150px;
overflow:auto;
padding:10px;
}
</style>
</head>

<body>

<!-- START -->
<div id="start">
<h1>MONOMONO RPG</h1>
<button onclick="goCreate()">開始</button>
</div>

<!-- CREATE -->
<div id="create" class="hidden">
<input id="name" placeholder="名前">
<br>
見た目:<input type="file" id="img">
<br>
<button onclick="create()">作成</button>
</div>

<!-- TOWN -->
<div id="town" class="hidden">
<h2>街</h2>

<div id="status"></div>

<button onclick="goExplore()">探索</button>
<button onclick="goTower()">試練の塔</button>
<button onclick="save()">セーブ</button>
<button onclick="load()">続きから</button>

</div>

<!-- EXPLORE -->
<div id="explore" class="hidden">
<h2 id="areaTitle"></h2>

<div class="battle">

<div class="char">
<img id="pimg" width="80">
<div id="pname"></div>
<div class="bar"><div id="php" class="hp"></div></div>
</div>

<div>VS</div>

<div class="char">
<div id="enemy"></div>
<div class="bar"><div id="ehp" class="hp"></div></div>
</div>

</div>

<div class="log" id="log"></div>

<button onclick="returnTown()">街に戻る</button>
</div>

<script>
let p=null;
let state="";

function goCreate(){
show("create");
}

function create(){
p={
name:val("name")||"名無し",
lv:1,
exp:0,
bp:10,
hp:100,
maxhp:100,
img:""
};
p.img=document.getElementById("img").files[0]
?URL.createObjectURL(document.getElementById("img").files[0])
:"👤";

show("town");
update();
}

/* 探索 */
function goExplore(){
state="explore";
show("explore");

startBattle({
name:"スライム",
hp:30,
atk:5
});
}

/* 戦闘 */
function startBattle(e){
let hp=e.hp;

document.getElementById("enemy").innerText=e.name;
document.getElementById("pimg").src=p.img;
document.getElementById("pname").innerText=p.name;

let loop=setInterval(()=>{
hp-=10;
p.hp-=e.atk;

document.getElementById("ehp").style.width=(hp/e.hp*100)+"%";
document.getElementById("php").style.width=(p.hp/p.maxhp*100)+"%";

log("攻撃！");

if(hp<=0){
clearInterval(loop);
win();
}
if(p.hp<=0){
clearInterval(loop);
lose();
}
},600);
}

/* 勝利 */
function win(){
log("勝利！");

setTimeout(()=>{
p.exp+=20;
p.bp+=2;

if(p.exp>=100){
p.lv++;
p.exp=0;
p.bp+=5;
}

show("town");
update();
},2000);
}

/* 負け */
function lose(){
log("敗北...");
setTimeout(()=>show("town"),2000);
}

/* 街 */
function goTower(){
alert("塔未実装（次で追加）");
}

/* セーブ */
function save(){
localStorage.setItem("mono",JSON.stringify(p));
}

/* ロード */
function load(){
p=JSON.parse(localStorage.getItem("mono"));
show("town");
update();
}

/* UI */
function update(){
document.getElementById("status").innerHTML=`
${p.name} Lv${p.lv}<br>
EXP:${p.exp}<br>
BP:${p.bp}<br>
`;
}

function returnTown(){
show("town");
}

function log(t){
document.getElementById("log").innerHTML+=t+"<br>";
}

function show(id){
["start","create","town","explore"].forEach(i=>{
document.getElementById(i).classList.add("hidden");
});
document.getElementById(id).classList.remove("hidden");
}

function val(id){return document.getElementById(id).value}
</script>

</body>
</html>
