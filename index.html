<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>モノモノ オンライン</title>
    <style>
        body { background: #1a1a1a; color: white; font-family: 'Courier New', monospace; text-align: center; }
        .box { border: 4px solid #555; width: 420px; margin: 20px auto; padding: 20px; background: #222; position: relative; }
        .hidden { display: none; }
        .pixel-img { width: 100px; height: 100px; image-rendering: pixelated; }
        
        /* メニューボタン */
        .menu-btn { width: 100%; padding: 10px; margin: 5px 0; background: #444; color: white; border: 1px solid #888; cursor: pointer; font-weight: bold; }
        .menu-btn:hover { background: #666; }
        
        /* ステータス表示 */
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; text-align: left; background: #333; padding: 10px; border-radius: 5px; }
        
        /* バトル画面 */
        .battle-display { display: flex; justify-content: space-around; align-items: center; height: 150px; border-bottom: 2px solid #444; margin-bottom: 10px; }
        .hp-bar-bg { width: 80px; height: 8px; background: #550000; margin: 5px auto; border: 1px solid #fff; }
        .hp-bar-fill { height: 100%; background: #ff4757; transition: 0.3s; }
        
        #log { border: 2px solid #444; padding: 10px; height: 80px; overflow-y: auto; font-size: 13px; text-align: left; background: #000; color: #0f0; margin-top: 10px; }
        h1 { color: #ffce00; text-shadow: 2px 2px #000; font-size: 24px; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="box">
    <h1>モノモノ オンライン</h1>

    <div id="setup-screen">
        <p>名前: <input type="text" id="p-name-input" value="ユウシャ"></p>
        <p>画像: <input type="file" accept="image/*" id="img-upload"></p>
        <div id="job-list">
            <p>職業を選択（変更不可）</p>
            <button class="menu-btn" onclick="setJob('剣士')">剣士</button>
            <button class="menu-btn" onclick="setJob('戦士')">戦士</button>
            <button class="menu-btn" onclick="setJob('魔法使い')">魔法使い</button>
            <button class="menu-btn" onclick="setJob('盗賊')">盗賊</button>
            <button class="menu-btn" onclick="setJob('弓使い')">弓使い</button>
            <button class="menu-btn" onclick="setJob('魔物使い')">魔物使い</button>
            <button class="menu-btn" onclick="setJob('大盾使い')">大盾使い</button>
            <button class="menu-btn" onclick="setJob('僧侶')">僧侶</button>
        </div>
    </div>

    <div id="point-screen" class="hidden">
        <h3>残りBP: <span id="bp">14</span></h3>
        <div id="stat-config"></div>
        <button class="menu-btn" id="start-btn" onclick="toMenu()" disabled>キャラ確定</button>
    </div>

    <div id="main-menu" class="hidden">
        <button class="menu-btn" style="background:#8e44ad;" onclick="startBattle()">⚔ 探索に行く</button>
        <button class="menu-btn" onclick="showScreen('status-screen')">👤 ステータス確認</button>
        <button class="menu-btn" onclick="alert('店主「まだ準備中だよ」')">💰 店（準備中）</button>
    </div>

    <div id="status-screen" class="hidden">
        <h3>キャラクター情報</h3>
        <div id="status-display" class="stat-grid"></div>
        <button class="menu-btn" onclick="toMenu()">戻る</button>
    </div>

    <div id="battle-screen" class="hidden">
        <div class="battle-display">
            <div>
                <div id="p-name-disp"></div>
                <div class="hp-bar-bg"><div id="p-hp-bar" class="hp-bar-fill" style="width:100%"></div></div>
                <div id="player-view">👤</div>
            </div>
            <div style="font-weight:bold; color:red;">VS</div>
            <div>
                <div>スライム</div>
                <div class="hp-bar-bg"><div id="e-hp-bar" class="hp-bar-fill" style="width:100%"></div></div>
                <div id="enemy-view" style="font-size:50px;">💧</div>
            </div>
        </div>
        <div id="battle-info">戦闘中...</div>
    </div>

    <div id="log">モノモノ オンラインへようこそ。</div>
</div>

<script>
const jobData = {
    "剣士": {hp:12, mp:5, atk:15, def:8, matk:5, mdef:8, spd:12, crit:0.2},
    "戦士": {hp:20, mp:3, atk:18, def:12, matk:2, mdef:5, spd:6, crit:0.05},
    "魔法使い": {hp:8, mp:25, atk:4, def:5, matk:20, mdef:15, spd:8, crit:0.05},
    "盗賊": {hp:10, mp:8, atk:10, def:6, matk:6, mdef:6, spd:20, crit:0.25},
    "弓使い": {hp:10, mp:10, atk:14, def:7, matk:5, mdef:7, spd:15, crit:0.2},
    "魔物使い": {hp:12, mp:15, atk:8, def:8, matk:8, mdef:8, spd:10, pet:true},
    "大盾使い": {hp:25, mp:5, atk:8, def:20, matk:2, mdef:12, spd:4, crit:0.02},
    "僧侶": {hp:15, mp:20, atk:6, def:10, matk:10, mdef:18, spd:8, crit:0.05}
};

let myStats = null;
let maxHP = 0;
let curHP = 0;
let points = 14;
let playerName = "";
let battleInterval = null;

// 画像アップロード
document.getElementById('img-upload').onchange = function(e) {
    const reader = new FileReader();
    reader.onload = function(event) {
        document.getElementById('player-view').innerHTML = `<img src="${event.target.result}" class="pixel-img">`;
    };
    reader.readAsDataURL(e.target.files[0]);
};

function setJob(name) {
    myStats = {...jobData[name]};
    myStats.job = name;
    showScreen('point-screen');
    renderPointConfig();
}

function renderPointConfig() {
    const div = document.getElementById('stat-config');
    div.innerHTML = "";
    const names = {hp:"体力", mp:"魔力", atk:"攻撃", def:"防御", matk:"魔攻", mdef:"魔防", spd:"速度"};
    for (let key in names) {
        div.innerHTML += `<div style="display:flex; justify-content:space-between; margin:5px;">
            ${names[key]}: ${myStats[key]} <button onclick="addPoint('${key}')">+</button>
        </div>`;
    }
}

function addPoint(key) {
    if (points > 0) {
        myStats[key]++;
        points--;
        document.getElementById('bp').innerText = points;
        renderPointConfig();
        if (points === 0) document.getElementById('start-btn').disabled = false;
    }
}

function toMenu() {
    playerName = document.getElementById('p-name-input').value;
    maxHP = myStats.hp * 5; // 体力1につきHP5換算
    curHP = maxHP;
    showScreen('main-menu');
    addLog("拠点の村に到着した。");
}

function showScreen(id) {
    ["setup-screen", "point-screen", "main-menu", "status-screen", "battle-screen"].forEach(s => {
        document.getElementById(s).classList.add('hidden');
    });
    document.getElementById(id).classList.remove('hidden');
    if(id === 'status-screen') renderStatus();
}

function renderStatus() {
    const div = document.getElementById('status-display');
    div.innerHTML = `<div>職業: ${myStats.job}</div><div>HP: ${curHP}/${maxHP}</div>`;
    const names = {mp:"魔力", atk:"攻撃", def:"防御", matk:"魔攻", mdef:"魔防", spd:"速度"};
    for (let key in names) div.innerHTML += `<div>${names[key]}: ${myStats[key]}</div>`;
}

// バトルロジック
function startBattle() {
    showScreen('battle-screen');
    document.getElementById('p-name-disp').innerText = playerName;
    let enemy = { name: "スライム", hp: 50, maxHp: 50, atk: 8, spd: 5 };
    updateHPBars(enemy);
    addLog("スライムに遭遇！");

    battleInterval = setInterval(() => {
        // 先制判定
        if (myStats.spd >= enemy.spd) {
            if (playerAttack(enemy)) return endBattle(true);
            if (enemyAttack(enemy)) return endBattle(false);
        } else {
            if (enemyAttack(enemy)) return endBattle(false);
            if (playerAttack(enemy)) return endBattle(true);
        }
    }, 1200);
}

function playerAttack(enemy) {
    let isCrit = Math.random() < (myStats.crit || 0.05);
    let dmg = Math.max(1, Math.floor(myStats.atk * (isCrit ? 2 : 1) - (enemy.spd / 2)));
    enemy.hp -= dmg;
    addLog(`${playerName}の攻撃！${enemy.name}に${dmg}ダメージ！${isCrit ? '★' : ''}`);
    updateHPBars(enemy);
    return enemy.hp <= 0;
}

function enemyAttack(enemy) {
    // 回避判定
    if (Math.random() < (myStats.spd - enemy.spd) * 0.05) {
        addLog(`${playerName}は攻撃をひらりと身をかわした！`);
        return false;
    }
    let dmg = Math.max(1, Math.floor(enemy.atk - (myStats.def / 3)));
    curHP -= dmg;
    addLog(`${enemy.name}の攻撃！${playerName}は${dmg}ダメージ受けた！`);
    updateHPBars(enemy);
    return curHP <= 0;
}

function updateHPBars(enemy) {
    document.getElementById('p-hp-bar').style.width = (curHP / maxHP * 100) + "%";
    document.getElementById('e-hp-bar').style.width = (enemy.hp / enemy.maxHp * 100) + "%";
}

function endBattle(win) {
    clearInterval(battleInterval);
    if (win) {
        addLog("勝利！経験値を得た。");
        document.getElementById('enemy-view').innerText = "💀";
    } else {
        addLog("敗北した...。村へ運ばれた。");
        curHP = Math.floor(maxHP * 0.1); // 瀕死で復活
    }
    setTimeout(() => toMenu(), 2000);
}

function addLog(msg) {
    const log = document.getElementById('log');
    log.innerHTML = msg + "<br>" + log.innerHTML;
}
</script>
</body>
</html>
