<style>
    /* ドット絵を表示するためのベースクラス */
    .dot-char {
        width: 4px;   /* 1ドットのサイズ */
        height: 4px;
        position: relative;
        image-rendering: pixelated; /* ぼやけないように設定 */
    }

    /* 戦士のドット絵（box-shadowで位置を指定して色を置く） */
    .hero-dot {
        background: transparent;
        box-shadow: 
            /* x y color */
            4px 0px #333, 8px 0px #333, 12px 0px #333,
            4px 4px #f1c40f, 8px 4px #f1c40f, 12px 4px #f1c40f,
            0px 8px #333, 4px 8px #f1c40f, 8px 8px #f1c40f, 12px 8px #f1c40f, 16px 8px #333,
            4px 12px #333, 8px 12px #333, 12px 12px #333;
        width: 4px;
        height: 4px;
    }

    /* スライムのドット絵 */
    .slime-dot {
        box-shadow: 
            4px 0px #0984e3, 8px 0px #0984e3,
            0px 4px #0984e3, 4px 4px #74b9ff, 8px 4px #74b9ff, 12px 4px #0984e3,
            0px 8px #0984e3, 4px 8px #0984e3, 8px 8px #0984e3, 12px 8px #0984e3;
        width: 4px;
        height: 4px;
