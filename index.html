<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ドット絵風キャラクリRPG</title>
    <style>
        /* ドット絵風のフォントとガタガタした枠線 */
        body { background-color: #1a1a1a; color: #fff; font-family: 'Courier New', Courier, monospace; text-align: center; }
        .screen { border: 4px solid #fff; width: 350px; margin: 20px auto; padding: 20px; image-rendering: pixelated; }
        
        /* バトルフィールド */
        .battle-field { display: flex; justify-content: space-around; align-items: flex-end; height: 120px; border-bottom: 2px solid #555; margin-bottom: 20px; }
        .character { font-size: 60px; transition: 0.1s; }
        
        /* キャラクリ用ボタン */
        .config { background: #333; padding: 10px; margin-bottom: 10px; border-radius: 5px; }
        button { background: #fff; color: #000; border: 2px solid #999; padding: 5px 10px; cursor: pointer; font-weight: bold; }
        button:hover { background: #ccc; }
        
        .hp-label { font-size: 12px; margin-bottom: 5px; }
        .log { height: 50px; font-size: 14px; border-top: 1px solid #555; padding-top: 10px; }
    </style>
</head>
<body>

    <div class="screen">
        <div class="config">
            <div>【キャラクリ】</div>
            <button onclick="changeJob('⚔️')">戦士</button>
            <button onclick="changeJob('🧙')">魔法使い</button>
            <button onclick="changeJob('🥷')">忍者</button>
        </div>

        <div class="battle-field">
            <div>
                <div class="hp-label">Player</div>
                <div id="player" class="character">⚔️</div>
            </div>
            <div>
                <div class="hp-label">HP: <span id="enemy-hp">50</span></div>
                <div id="enemy" class="character">💧</div>
            </div>
        </div>

        <button style="width: 100%; height: 50px; font-size: 20px;" onclick="attack()">たたかう！</button>
        <div id="log" class="log">冒険の準備はいいか？</div>
    </div>

    <script>
        let enemyHP = 50;
        let playerIcon = '⚔️';

        // 職種（見た目）を変える関数
        function changeJob(icon) {
            playerIcon = icon;
            document.getElementById('player').innerText = icon;
            document.getElementById('log').innerText = "ジョブをチェンジした！";
        }

        // 攻撃の関数
        function attack() {
            if (enemyHP <= 0) return;

            const damage = Math.floor(Math.random() * 10) + 5;
            enemyHP -= damage;
            if (enemyHP < 0) enemyHP = 0;

            // 演出：プレイヤーを一瞬動かす
            const p = document.getElementById('player');
            p.style.transform = "translateX(20px)";
            setTimeout(() => p.style.transform = "translateX(0)", 100);

            // 表示更新
            document.getElementById('enemy-hp').innerText = enemyHP;
            
            if (enemyHP <= 0) {
                document.getElementById('enemy').innerText = "💀";
                document.getElementById('log').innerText = "敵を撃破した！";
            } else {
                document.getElementById('log').innerText = damage + "のダメージ！";
            }
        }
    </script>
</body>
</html>
