<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>カスタムドット絵RPG</title>
    <style>
        body { background-color: #1a1a1a; color: #fff; font-family: 'Courier New', monospace; text-align: center; margin: 0; padding: 20px; }
        .screen { border: 4px solid #fff; width: 420px; margin: 0 auto; padding: 20px; background: #222; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        
        /* キャラ作成エリア */
        .maker { background: #333; padding: 15px; margin-bottom: 20px; border-radius: 8px; text-align: left; font-size: 14px; border: 1px solid #555; }
        .maker h3 { margin-top: 0; color: #ffce00; font-size: 16px; border-bottom: 1px solid #555; }
        input[type="text"] { width: 120px; background: #000; color: #fff; border: 1px solid #fff; padding: 3px; }
        
        /* 職業ボタン */
        .job-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; margin-top: 10px; }
        .job-btn { background: #444; color: #fff; border: 1px solid #aaa; padding: 5px; cursor: pointer; font-size: 12px; }
        .job-btn:hover:not(:disabled) { background: #666; }
        .job-btn:disabled { opacity: 0.5; cursor: default; border-color: #ffce00; color: #ffce00; }

        /* ステータス振り分け */
        .stat-table { width: 100%; margin-top: 10px; border-collapse: collapse; }
        .stat-table td { padding: 4px; border-bottom: 1px solid #444; }
        .btn-plus { width: 30px; height: 30px; cursor: pointer; background: #fff; border: none; font-weight: bold; }

        /* バトルエリア */
        .battle-field { display: flex; justify-content: space-around; align-items: flex-end; height: 160px; border-bottom: 2px solid #555; margin: 20px 0; padding-bottom: 10px; }
        .char-preview { position: relative; width: 100px; height: 100px; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; }
        
        /* ドット絵表示設定 */
        .pixel-img {
            width: 80px; height: 80px;
            object-fit: contain;
            image-rendering: pixelated;
            image-rendering: -moz-crisp-edges;
            transition: transform 0.1s;
        }
        .hp-label { font-size: 12px; color: #ff7675; margin-bottom: 5px; font-weight: bold; }

        button#attack-btn { width: 100%; height: 50px; background: #d63031; color: #fff; border: none; font-size: 18px; font-weight: bold; cursor: pointer; display: none; }
        button#attack-btn:hover { background: #ff7675; }
        #log { font-size: 14px; margin-top: 15px; min-height: 40px; color: #00cec9; }
    </style>
</head>
<body>

<div class="screen">
    <h2>CHARACTER CREATE</h2>
    
    <div class="maker">
        <div>名前: <input type="text" id="name-input" value="ユウシャ" oninput="updateName()"></div>
        <div style="margin-top:10px;">画像: <input type="file" accept="image/*" onchange="loadCharacter(event)"></div>
    </div>

    <div id="job-selector" class="maker">
        <h3>1. 職業を選択（変更不可）</h3>
        <div class="job-grid" id="job-buttons">
            <button class="job-btn" onclick="selectJob('剣士')">剣士</button>
            <button class="job-btn" onclick="selectJob('戦士')">戦士</button>
            <button class="job-btn" onclick="selectJob('魔法使い')">魔法使い</button>
            <button class="job-btn" onclick="selectJob('盗賊')">盗賊</button>
            <button class="job-btn" onclick="selectJob('弓使い')">弓使い</button>
            <button class="job-btn" onclick="selectJob('魔物使い')">魔物使い</button>
            <button class="job-btn" onclick="selectJob('大盾使い')">大盾使い</button>
            <button class="job-btn" onclick="selectJob('僧侶')">僧侶</button>
        </div>
    </div>

    <div id="status-screen" class="maker" style="display:none;">
        <h3>2. ポイントを振る (残り: <span id="bp-display">14</span>)</h3>
        <table class="stat-table">
            <tr><td>体力</td><td id="stat-hp">0</td><td><button class="btn-plus" onclick="addStat('hp')">+</button></td><td>魔防</td><td id="stat-mdef">0</td><td><button class="btn-plus" onclick="addStat('mdef')">+</button></td></tr>
            <tr><td>魔力</td><td id="stat-mp">0</td><td><button class="btn-plus" onclick="addStat('mp')">+</button></td><td>速度</td><td id="stat-spd">0</td><td><button class="btn-plus" onclick="addStat('spd')">+</button></td></tr>
            <tr><td>攻撃</td><td id="stat-atk">0</td><td><button class="btn-plus" onclick="addStat('atk')">+</button></td><td colspan="3"></td></tr>
            <tr><td>防御</td><td id="stat-def">0</td><td><button class="btn-plus" onclick="addStat('def')">+</button></td><td colspan="3"></td></tr>
            <tr><td>魔攻</td><td id="stat-matk">0</td><td><button class="btn-plus" onclick="addStat('matk')">+</button></td><td colspan="3"></td></tr>
        </table>
        <button id="start-btn" style="width:100%; margin-top:10px; height:30px;" onclick="startGame()" disabled>冒険開始！</button>
    </div>

    <div class="battle-field">
        <div class="char-preview">
            <div class="hp-label" id="p-name">ユウシャ</div>
            <div id="player-body">
                <img id="player-img" src="" style="display:none;" class="pixel-img">
                <span id="default-icon" style="font-size:50px;">👤</span>
            </div>
        </div>
        <div class="char-preview">
            <div class="hp-label">スライム HP:<span id="e-hp">100</span></div>
            <div id="enemy-view" style="font-size: 50px; transition: 0.1s;">💧</div>
        </div>
    </div>

    <button id="attack-btn" onclick="attack()">たたかう！</button>
    <div id="log">職業とステータスを決めてください。</div>
</div>

<script>
    // データ定義
    const jobs = {
        "剣士": { hp: 12, mp: 5, atk: 15, def: 8, matk: 5, mdef: 8, spd: 12, crit: 0.2 },
        "戦士": { hp: 20, mp: 3, atk: 18, def: 12, matk: 2, mdef: 5, spd: 6, crit: 0.05 },
        "魔法使い": { hp: 8, mp: 25, atk: 4, def: 5, matk: 20, mdef: 15, spd: 8, crit: 0.05 },
        "盗賊": { hp: 10, mp: 8, atk: 10, def: 6, matk: 6, mdef: 6, spd: 20, crit: 0.25 },
        "弓使い": { hp: 10, mp: 10, atk: 14, def: 7, matk: 5, mdef: 7, spd: 15, crit: 0.2 },
        "魔物使い": { hp: 12, mp: 15, atk: 8, def: 8, matk: 8, mdef: 8, spd: 10, pet: true },
        "大盾使い": { hp: 25, mp: 5, atk: 8, def: 20, matk: 2, mdef: 12, spd: 4, crit: 0.02 },
        "僧侶": { hp: 15, mp: 20, atk: 6, def: 10, matk: 10, mdef: 18, spd: 8, crit: 0.05 }
    };

    let playerStats = null;
    let bonusPoints = 14;
    let playerName = "ユウシャ";
    let enemyHP = 100;
    let isGameStarted = false;

    // 名前更新
    function updateName() {
        playerName = document.getElementById('name-input').value;
        document.getElementById('p-name').innerText = playerName;
    }

    // 画像読み込み
    function loadCharacter(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            const img = document.getElementById('player-img');
            img.src = e.target.result;
            img.style.display = "block";
            document.getElementById('default-icon').style.display = "none";
        };
        reader.readAsDataURL(file);
    }

    // 職業選択
    function selectJob(jobName) {
        playerStats = { ...jobs[jobName] };
        document.querySelectorAll('.job-btn').forEach(b => {
            b.disabled = true;
            if(b.innerText === jobName) b.style.background = "#00cec9";
        });
        document.getElementById('status-screen').style.display = 'block';
        updateStatUI();
        document.getElementById('log').innerText = `${jobName}を選択。ポイントを振ってください。`;
    }

    // ポイント追加
    function addStat(key) {
        if (bonusPoints > 0) {
            playerStats[key]++;
            bonusPoints--;
            updateStatUI();
            if (bonusPoints === 0) document.getElementById('start-btn').disabled = false;
        }
    }

    function updateStatUI() {
        document.getElementById('bp-display').innerText = bonusPoints;
        for (let key in playerStats) {
            const el = document.getElementById('stat-' + key);
            if (el) el.innerText = playerStats[key];
        }
    }

    // ゲーム開始
    function startGame() {
        isGameStarted = true;
        document.getElementById('status-screen').style.display = 'none';
        document.getElementById('job-selector').style.display = 'none';
        document.querySelector('.maker').style.display = 'none'; // 基本設定も隠す
        document.getElementById('attack-btn').style.display = 'block';
        document.getElementById('log').innerText = "スライムがあらわれた！";
    }

    // 攻撃処理
    function attack() {
        if (enemyHP <= 0) return;

        // クリティカル判定
        const isCrit = Math.random() < (playerStats.crit || 0.05);
        let dmg = Math.floor(playerStats.atk * (isCrit ? 2 : 1) * (0.8 + Math.random() * 0.4));
        
        enemyHP -= dmg;
        if (enemyHP < 0) enemyHP = 0;

        // 演出
        const pImg = document.getElementById('player-img').style.display === "block" ? 
                     document.getElementById('player-img') : document.getElementById('default-icon');
        const eView = document.getElementById('enemy-view');

        pImg.style.transform = "translateX(30px)";
        setTimeout(() => pImg.style.transform = "translateX(0)", 100);

        document.getElementById('e-hp').innerText = enemyHP;
        document.getElementById('log').innerText = `${playerName}の攻撃！ ${isCrit ? '★痛恨の一撃！★ ' : ''}${dmg}のダメージ！`;

        if (enemyHP <= 0) {
            eView.innerText = "💀";
            document.getElementById('log').innerText += "\n敵を倒した！";
            document.getElementById('attack-btn').disabled = true;
        }
    }
</script>
</body>
</html>
