<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>MONOMONO ONLINE</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- START画面 -->
<div id="start" class="screen">
  <h1>MONOMONO ONLINE</h1>
  <button onclick="goCreate()">NEW GAME</button>
  <button onclick="loadGame()">CONTINUE</button>
</div>

<!-- キャラ作成 -->
<div id="create" class="screen hidden">
  <h2>CREATE CHARACTER</h2>
  <input id="name" placeholder="NAME"><br><br>
  <input type="file" id="img"><br><br>
  <button onclick="createPlayer()">START</button>
</div>

<!-- メニュー -->
<div id="menu" class="screen hidden">
  <section class="status-panel">
    <h2>ステータス</h2>
    <table>
      <tr><th>名前</th><td id="pname-status"></td></tr>
      <tr><th>レベル</th><td id="plv-status"></td></tr>
      <tr><th>HP</th><td id="php-status"></td></tr>
      <tr><th>EXP</th><td id="pexp-status"></td></tr>
    </table>
  </section>
  <section class="action-panel">
    <h2>行動メニュー</h2>
    <button onclick="exploreArea()">探索する</button><br><br>
    <button onclick="startTower()">塔に挑戦</button><br><br>
    <button onclick="saveGame()">セーブ</button><br><br>
    <button onclick="logout()">ログアウト</button>
  </section>
</div>

<!-- 戦闘 -->
<div id="battle" class="screen hidden">
  <div id="battleTop">
    <div class="unit">
      <img id="pimg" width="80">
      <div id="pname"></div>
      <div class="bar"><div id="php" class="hp"></div></div>
    </div>
    <div class="vs">VS</div>
    <div class="unit">
      <div id="ename"></div>
      <div class="bar"><div id="ehp" class="hp"></div></div>
    </div>
  </div>
  <div id="log"></div>
</div>

<script src="data.js"></script>
<script src="game.js"></script>
<script src="battle.js"></script>

</body>
</html>
