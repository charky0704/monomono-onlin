<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>はらぺこスライム討伐戦</title>
    <style>
        /* 見た目をちょっとファンタジー風に */
        body { background-color: #2c3e50; color: #ecf0f1; text-align: center; font-family: "Hiragino Kaku Gothic ProN", sans-serif; }
        .game-box { border: 4px double #bdc3c7; width: 300px; margin: 50px auto; padding: 20px; border-radius: 10px; }
        .hp-bar { font-size: 24px; color: #e74c3c; font-weight: bold; margin: 20px 0; }
        button { background: #d35400; color: white; border: none; padding: 10px 20px; font-size: 18px; cursor: pointer; border-radius: 5px; }
        button:hover { background: #e67e22; }
        #log { margin-top: 20px; font-size: 14px; color: #bdc3c7; height: 60px; overflow-y: auto; }
    </style>
</head>
<body>

    <div class="game-box">
        <h2>スライムがあらわれた！</h2>
        <div style="font-size: 50px;">💧</div>
        
        <div class="hp-bar">HP: <span id="hp">50</span></div>
        
        <button onclick="attack()">こうげきする！</button>

        <div id="log">冒険のはじまりだ！</div>
    </div>

    <script>
        // ゲームのデータ（ここがプログラムの心臓部）
        let slimeHP = 50;

        function attack() {
            if (slimeHP <= 0) return;

            // 1. ダメージを計算（5〜15のランダム）
            const damage = Math.floor(Math.random() * 11) + 5;
            
            // 2. HPを減らす
            slimeHP -= damage;
            if (slimeHP < 0) slimeHP = 0;

            // 3. 画面を書き換える
            document.getElementById('hp').innerText = slimeHP;
            const log = document.getElementById('log');
            
            if (slimeHP <= 0) {
                log.innerHTML = "スライムをたおした！<br>君の勝ちだ！🎉";
                document.querySelector('button').innerText = "勝利！";
            } else {
                log.innerText = damage + " のダメージをあたえた！";
            }
        }
    </script>

</body>
</html>
