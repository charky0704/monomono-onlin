<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>MONOMONO ONLINE - Sky Edition</title>

<style>
:root { 
    --panel: rgba(255,255,255,0.85); 
    --accent: #00aaff; 
    --sub-accent: #0077ff;
    --xp: #39ff14; 
    --hp: #ff0055; 
    --gold: #ffce00;
}

/* 🌤 空背景 */
body { 
    background: linear-gradient(to bottom, #87cefa, #e0f7ff);
    color: #0a0a12;
    font-family: 'Segoe UI', sans-serif; 
    margin: 0; padding: 10px; 
    display: flex; justify-content: center; 
    height: 100vh; overflow: hidden;
}

.game-container { display: flex; width: 100%; max-width: 1200px; gap: 20px; height: 95vh; }

.panel { 
    background: var(--panel); 
    border-radius: 20px; 
    padding: 20px; 
    box-shadow: 0 0 20px rgba(0,0,0,0.2);
}

.side-panel { flex: 1; min-width: 300px; border-left: 4px solid var(--accent); }
.main-panel { flex: 2; text-align: center; overflow-y: auto;}

.btn { 
    width: 100%; padding: 15px; margin: 10px 0; 
    background: white; border: 1px solid var(--accent); 
    border-radius: 12px; cursor: pointer;
}
.btn:hover { background: var(--accent); color: white; }

.hidden { display: none !important; }

.bar-bg { height: 12px; background: #ccc; border-radius: 6px; }
.hp-fill { height: 100%; background: red; width: 100%; }
.xp-fill { height: 100%; background: lime; width: 0%; }

#battle-log {
    height: 200px;
    overflow-y: auto;
    background: #fff;
    padding: 10px;
    text-align: left;
}
</style>
</head>

<body>

<div class="game-container">

<div id="side-info" class="side-panel panel hidden">
    <div id="disp-name"></div>
    <div id="disp-level"></div>
    <div class="bar-bg"><div id="p-hp-bar" class="hp-fill"></div></div>
    <div class="bar-bg"><div id="p-xp-bar" class="xp-fill"></div></div>
</div>

<div class="main-panel panel">

<div id="start-ui">
    <h1>MONOMONO ONLINE</h1>
    <button class="btn" onclick="showSub('create-ui')">NEW GAME</button>
</div>

<div id="create-ui" class="hidden">
    <input type="text" id="new-name" placeholder="Name">
    <button class="btn" onclick="createNewChar()">START</button>
</div>

<div id="menu-ui" class="hidden">
    <button class="btn" onclick="encount()">戦闘</button>
</div>

<div id="battle-ui" class="hidden">
    <div id="battle-log"></div>
</div>

</div>
</div>

<script>
let p=null, curHp=0;

function createNewChar(){
    const name=document.getElementById('new-name').value;
    p={name,lv:1,exp:0,gold:0,stats:{hp:10,atk:5,def:3}};
    curHp=50;
    document.getElementById('side-info').classList.remove('hidden');
    showSub('menu-ui');
    updateUI();
}

function updateUI(){
    document.getElementById('disp-name').innerText=p.name;
    document.getElementById('disp-level').innerText="Lv."+p.lv;
}

function encount(){
    startBattle({en:"SLIME",hp:30,atk:5,exp:20});
}

function startBattle(e){
    showSub('battle-ui');
    const log=document.getElementById('battle-log');
    log.innerHTML="敵出現："+e.en+"<br>";

    let hp=e.hp;

    let loop=setInterval(()=>{
        hp-=p.stats.atk;
        log.innerHTML+="攻撃！<br>";

        if(hp<=0){
            clearInterval(loop);
            finishBattle(true,e);
        }
    },500);
}

/* ✅ 撃破後演出 */
function finishBattle(win,e){
    const log=document.getElementById('battle-log');

    if(win){
        log.innerHTML+="🏆 "+e.en+" を倒した！";

        setTimeout(()=>{
            p.exp+=e.exp;
            showSub('menu-ui');
        },2000);
    }
}

function showSub(id){
    ["start-ui","create-ui","menu-ui","battle-ui"]
    .forEach(i=>document.getElementById(i).classList.add('hidden'));

    document.getElementById(id).classList.remove('hidden');
}
</script>

</body>
</html>
