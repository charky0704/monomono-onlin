<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>MONOMONO ONLINE - World Map Update</title>
    <style>
        :root { --main-bg: #1a1a2e; --panel: rgba(20,20,40,0.95); --accent: #ffce00; }
        body { background: var(--main-bg); color: white; font-family: sans-serif; margin: 0; padding: 10px; display: flex; justify-content: center; height: 100vh; overflow: hidden; }
        .game-container { display: flex; width: 100%; max-width: 1100px; gap: 15px; height: 95vh; }
        .side-panel, .main-panel { background: var(--panel); border: 2px solid #333; border-radius: 15px; padding: 15px; overflow-y: auto; }
        .side-panel { flex: 1; min-width: 280px; }
        .main-panel { flex: 2; position: relative; }
        .btn { width: 100%; padding: 12px; margin: 5px 0; background: #333; color: white; border: 1px solid #555; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .btn:hover:not(:disabled) { background: #555; transform: scale(1.02); }
        .hp-bar-bg { width: 100%; height: 14px; background: #300; border-radius: 7px; overflow: hidden; border: 1px solid #777; margin: 5px 0; }
        .hp-bar-fill { height: 100%; background: linear-gradient(90deg, #ff4757, #ff6b81); width: 100%; transition: 0.3s; }
        .exp-bar-bg { width: 100%; height: 8px; background: #111; border-radius: 4px; overflow: hidden; margin-top: 5px; }
        .exp-bar-fill { height: 100%; background: #2ecc71; width: 0%; transition: 0.5s; }
        #battle-log { height: 180px; background: #000; padding: 10px; font-size: 13px; overflow-y: auto; border-radius: 10px; display: flex; flex-direction: column-reverse; border: 1px solid #444; }
        .hidden { display: none !important; }
        .pixel-img { width: 90px; height: 90px; object-fit: contain; image-rendering: pixelated; border: 2px solid var(--accent); background: #000; border-radius: 10px; }
        .bp-row { display: flex; justify-content: space-between; align-items: center; background: rgba(255,255,255,0.05); margin: 4px 0; padding: 8px; border-radius: 8px; }
        .bp-btn { width: 40px; height: 35px; border-radius: 5px; border: none; font-weight: bold; cursor: pointer; color: white; }
        .area-card { border: 1px solid #555; padding: 10px; margin: 10px 0; border-radius: 10px; background: rgba(255,255,255,0.03); }
    </style>
</head>
<body>

<div class="game-container">
    <div class="side-panel">
        <div id="side-img-view" style="text-align:center;">👤</div>
        <div id="disp-name" style="text-align:center; font-size:22px; font-weight:bold; margin:5px 0;">ゲスト</div>
        <div id="disp-level" style="text-align:center; font-size:14px; color:var(--accent);">Lv.-- 冒険者</div>
        <div class="hp-bar-bg"><div id="p-hp-bar" class="hp-bar-fill"></div></div>
        <div id="hp-text" style="font-size:12px; text-align:center;">HP: -- / --</div>
        <div id="stat-list" style="display:grid; grid-template-columns:1fr 1fr; gap:8px; font-size:12px; margin-top:15px; background:rgba(0,0,0,0.3); padding:10px; border-radius:10px;"></div>
        <div style="margin-top:20px;">
            <div style="display:flex; justify-content:space-between; font-size:12px;"><span>EXP</span><span id="exp-text">0/100</span></div>
            <div class="exp-bar-bg"><div id="p-exp-bar" class="exp-bar-fill"></div></div>
        </div>
        <div id="gold-disp" style="text-align:center; color:#f1c40f; font-size:20px; font-weight:bold; margin-top:20px;">💰 0</div>
        <div id="my-code-disp" style="font-size:10px; text-align:center; color:#888; margin-top:10px;"></div>
    </div>

    <div class="main-panel">
        <div id="login-ui">
            <h2>🌍 MONOMONO ONLINE</h2>
            <input type="text" id="login-id" placeholder="名前を入力" style="width:90%; padding:12px;">
            <input type="file" id="img-upload" style="margin-top:15px;">
            <button class="btn" onclick="auth()" style="background:var(--accent); color:black; margin-top:20px;">ログイン</button>
        </div>

        <div id="job-ui" class="hidden"><h3>職業を選択</h3><div id="job-btns"></div></div>

        <div id="point-ui" class="hidden">
            <h3>ステータス強化 (残りBP:<span id="bp-val">0</span>)</h3>
            <div id="point-config"></div>
            <button class="btn" id="point-ok" onclick="saveAndGoMenu()" style="background:var(--accent); color:black;">確定</button>
        </div>

        <div id="menu-ui" class="hidden">
            <h2 id="floor-tag">第1階層</h2>
            <button class="btn" onclick="showSub('area-ui')" style="background:#27ae60;">⚔ エリアを探索する</button>
            <button class="btn" onclick="showSub('tower-ui')" style="background:#8e44ad;">🗼 試練の塔</button>
            <button class="btn" onclick="showSub('online-ui')" style="background:#2980b9;">🌐 オンライン対戦・フレンド</button>
            <button class="btn" onclick="startCoop()" style="background:#e67e22;">🤝 フレンドと共闘</button>
        </div>

        <div id="area-ui" class="hidden">
            <h3>探索エリア選択</h3>
            <div id="area-list"></div>
            <button class="btn" onclick="showSub('menu-ui')">戻る</button>
        </div>

        <div id="online-ui" class="hidden">
            <h3>🌐 オンライン</h3>
            <input type="text" id="target-code" placeholder="MONO-XXXX-XXXX-XXXX" style="width:90%; padding:10px;">
            <button class="btn" onclick="addFriend()">フレンド登録</button>
            <button class="btn" onclick="startPvP()" style="background:#c0392b;">コードの相手と対戦</button>
            <button class="btn" onclick="showSub('menu-ui')">戻る</button>
        </div>

        <div id="tower-ui" class="hidden">
            <h3>🗼 試練の塔 (最高:<b id="tower-best">0</b>階)</h3>
            <button class="btn" onclick="startTower()" style="background:#8e44ad;">挑戦する</button>
            <button class="btn" onclick="showSub('menu-ui')">戻る</button>
        </div>

        <div id="battle-ui" class="hidden">
            <div style="display:flex; justify-content:space-around; align-items:center; background:rgba(0,0,0,0.6); padding:15px; border-radius:15px; border:1px solid #444;">
                <div id="p-battle-img"></div>
                <div id="c-battle-area" class="hidden"><div id="c-battle-img"></div></div>
                <div style="color:#ff4757; font-weight:bold; font-size:24px;">VS</div>
                <div id="e-side" style="text-align:center;">
                    <div id="e-icon" style="font-size:50px;">👿</div>
                    <div class="hp-bar-bg" style="width:80px;"><div id="e-b-hp" class="hp-bar-fill"></div></div>
                </div>
            </div>
            <div id="battle-log"></div>
        </div>
    </div>
</div>

<script>
const JOB_DATA = {
    "剣士": {hp:15, atk:15, def:10, spd:12},
    "魔法使い": {hp:10, atk:5, matk:22, def:6, spd:10, magic:true},
    "戦士": {hp:25, atk:13, def:15, spd:5},
    "盗賊": {hp:12, atk:12, def:7, spd:22},
    "僧侶": {hp:18, atk:8, def:12, spd:9, matk:12, magic:true}
};

const WORLD_AREAS = [
    { name: "静かな草原", icon: "🌱", desc: "スライム系の生息地。バランスが良い。", monsters: [{n:"スライム", i:"💧", hp:1.0, atk:0.8}, {n:"ハナコ", i:"🌸", hp:1.2, atk:0.7}] },
    { name: "迷いの森", icon: "🌳", desc: "素早い敵が多い。回避に注意。", monsters: [{n:"ウルフ", i:"🐺", hp:0.9, spd:1.5}, {n:"ハチ", i:"🐝", hp:0.6, spd:2.0}] },
    { name: "暗黒の洞窟", icon: "💎", desc: "防御力が高い硬いモンスター。魔法が有効。", monsters: [{n:"ゴーレム", i:"🗿", hp:2.0, def:1.5}, {n:"コウモリ", i:"🦇", hp:0.8, def:0.5}] }
];

let p = null, curHp = 0, bLoop = null, userImg = "", baseStats = {};

function auth() {
    const id = document.getElementById('login-id').value;
    if(!id) return alert("名前を入れてね");
    const saved = localStorage.getItem('mono_v7_' + id);
    if(saved) {
        p = JSON.parse(saved); userImg = p.img; curHp = p.stats.hp * 5; showSub('menu-ui');
    } else {
        if(!userImg) return alert("画像を選んでね");
        p = { name: id, job:"", lv:1, exp:0, gold:0, bp:14, stats:{}, floor:1, tower:0, cleared:[], img:userImg, friends:[], fCode: genCode() };
        showSub('job-ui');
        document.getElementById('job-btns').innerHTML = Object.keys(JOB_DATA).map(j => `<button class="btn" onclick="setJob('${j}')">${j}</button>`).join('');
    }
    updateUI();
}

function setJob(j) {
    p.job = j; p.stats = {...JOB_DATA[j]}; baseStats = {...JOB_DATA[j]};
    p.bp = 14; showSub('point-ui'); renderPoints();
}

function adjStat(k, v) {
    if(v > 0 && p.bp > 0) { p.stats[k]++; p.bp--; }
    if(v < 0 && p.stats[k] > baseStats[k]) { p.stats[k]--; p.bp++; }
    renderPoints(); updateUI();
}

function renderPoints() {
    document.getElementById('point-config').innerHTML = Object.keys(p.stats).map(k => `
        <div class="bp-row">
            <span>${k.toUpperCase()}: <b>${p.stats[k]}</b></span>
            <div>
                <button class="bp-btn" onclick="adjStat('${k}',-1)" style="background:#e74c3c;">-</button>
                <button class="bp-btn" onclick="adjStat('${k}',1)" style="background:#2ecc71;">+</button>
            </div>
        </div>`).join('');
    document.getElementById('bp-val').innerText = p.bp;
}

function saveAndGoMenu() {
    p.img = userImg; curHp = p.stats.hp * 5;
    localStorage.setItem('mono_v7_' + p.name, JSON.stringify(p));
    updateUI(); showSub('menu-ui');
}

function startBattle(e, isCoop = false) {
    showSub('battle-ui');
    const log = document.getElementById('battle-log');
    log.innerHTML = `<div><b>${e.en}</b> が飛び出してきた！</div>`;
    
    curHp = p.stats.hp * 5;
    let maxP = p.stats.hp * 5, curE = e.hp, maxE = e.hp;
    let partner = (isCoop && p.friends.length > 0) ? p.friends[0] : null;

    document.getElementById('p-battle-img').innerHTML = `<img src="${userImg}" class="pixel-img" style="width:60px;">`;
    document.getElementById('e-icon').innerText = e.i || "👿";
    document.getElementById('e-b-hp').style.width = "100%";
    
    bLoop = setInterval(() => {
        let pAtk = p.stats.magic ? p.stats.matk : p.stats.atk;
        let d = Math.max(1, pAtk - Math.floor((e.def || 5)/2));
        curE -= d; log.innerHTML += `<div>⚔ ${p.name}: ${d}ダメージ</div>`;

        if(partner && curE > 0) {
            let cd = Math.max(1, partner.s.atk - Math.floor((e.def || 5)/2));
            curE -= cd; log.innerHTML += `<div style="color:cyan;">🤝 フレンド: ${cd}ダメージ</div>`;
        }

        if(curE > 0) {
            let ed = Math.max(1, e.atk - Math.floor(p.stats.def/2));
            curHp -= ed; log.innerHTML += `<div style="color:red;">💥 敵の攻撃: ${ed}ダメージ</div>`;
        }

        document.getElementById('e-b-hp').style.width = (curE/maxE*100) + "%";
        updateUI();

        if(curE <= 0) { 
            clearInterval(bLoop); alert("勝利！");
            p.exp += e.exp; p.gold += Math.floor(e.exp * 0.7);
            checkLvUp();
        } else if(curHp <= 0) { 
            clearInterval(bLoop); alert("敗北..."); curHp = maxP; saveAndGoMenu();
        }
    }, 1000);
}

function checkLvUp() {
    let nextExp = p.lv * 100;
    if(p.exp >= nextExp) {
        p.exp -= nextExp; p.lv++; p.bp += 3;
        curHp = p.stats.hp * 5;
        baseStats = {...p.stats};
        alert("LEVEL UP! BP+3獲得");
        showSub('point-ui'); renderPoints();
    } else { saveAndGoMenu(); }
}

function genCode() {
    let r = "MONO-";
    for(let i=0; i<3; i++){
        r += Math.floor(Math.random()*9000+1000);
        if(i<2) r += "-";
    }
    return r;
}

function addFriend() {
    const code = document.getElementById('target-code').value;
    if(code.startsWith("MONO-")) {
        const dummy = { n:"勇者-"+code.slice(-4), s:{hp:20, atk:20, def:15}, img:userImg, l:p.lv };
        p.friends.push(dummy); alert("フレンド登録完了！"); updateUI();
    }
}

function startPvP() {
    const code = document.getElementById('target-code').value;
    if(!code) return alert("対戦相手のコードを入れてね");
    const e = { en:"他プレイヤー", hp:150, atk:20, def:10, exp:0, i:"👤" };
    startBattle(e);
}

function showSub(id) {
    ["login-ui", "job-ui", "point-ui", "menu-ui", "area-ui", "tower-ui", "online-ui", "battle-ui"].forEach(s => document.getElementById(s).classList.add('hidden'));
    document.getElementById(id).classList.remove('hidden');
    if(id === 'area-ui') renderAreaList();
}

function renderAreaList() {
    const box = document.getElementById('area-list');
    box.innerHTML = WORLD_AREAS.map((a, idx) => `
        <div class="area-card">
            <h4>${a.icon} ${a.name}</h4>
            <p style="font-size:11px; color:#aaa;">${a.desc}</p>
            <button class="btn" onclick="encount(${idx})" style="background:#27ae60;">このエリアを探索</button>
        </div>`).join('');
}

function encount(idx) {
    const area = WORLD_AREAS[idx];
    const mon = area.monsters[Math.floor(Math.random() * area.monsters.length)];
    const levelMult = p.floor;
    const enemy = {
        en: mon.n, i: mon.i,
        hp: Math.floor((50 + (idx * 20)) * (mon.hp || 1.0) * levelMult),
        atk: Math.floor((10 + (idx * 5)) * (mon.atk || 1.0) * levelMult),
        def: Math.floor((5 + (idx * 3)) * (mon.def || 1.0) * levelMult),
        exp: 30 + (idx * 20)
    };
    startBattle(enemy);
}

function startTower() {
    let f = p.tower + 1;
    startBattle({ en:`塔 ${f}階の番人`, hp:100+(f*20), atk:15+(f*4), exp:50+(f*10), i:"🗼" });
}

function startCoop() {
    if(p.friends.length === 0) return alert("フレンドがいません");
    startBattle({ en:"強襲ボス", hp:1200, atk:45, exp:400, i:"🐉" }, true);
}

function updateUI() {
    if(!p) return;
    const maxP = p.stats.hp * 5;
    const nextExp = p.lv * 100;
    document.getElementById('disp-name').innerText = p.name;
    document.getElementById('disp-level').innerText = `Lv.${p.lv} ${p.job}`;
    document.getElementById('side-img-view').innerHTML = `<img src="${p.img}" class="pixel-img">`;
    document.getElementById('hp-text').innerText = `HP: ${curHp} / ${maxP}`;
    document.getElementById('p-hp-bar').style.width = (curHp/maxP*100) + "%";
    document.getElementById('exp-text').innerText = `${p.exp}/${nextExp}`;
    document.getElementById('p-exp-bar').style.width = (p.exp/nextExp*100) + "%";
    document.getElementById('gold-disp').innerText = `💰 ${p.gold}`;
    document.getElementById('my-code-disp').innerText = "マイコード: " + p.fCode;
    document.getElementById('tower-best').innerText = p.tower;
    document.getElementById('stat-list').innerHTML = Object.keys(p.stats).map(k => `<div>${k.toUpperCase()}: ${p.stats[k]}</div>`).join('');
}

document.getElementById('img-upload').onchange = (e) => {
    const r = new FileReader(); r.onload = (ev) => { userImg = ev.target.result; updateUI(); }; r.readAsDataURL(e.target.files[0]);
};
</script>
</body>
</html>
