「自分でダウンロードして、特定のファイル名で保存してもらう」という仕組みですね。昔ながらのCGIゲーム（配布物）のようなスタイルで、非常に拡張性が高いです。

この場合、プログラム側では**「決まったファイル名」を参照するように設定**しておき、ユーザーにその名前で画像を置いておいてもらう形になります。

以下に、外部画像（静止画）を読み込むための修正版コードをまとめました。

1. 修正後のHTML/JavaScript構成
画像ファイル名は、管理しやすいように player_1.png （戦士）、player_2.png （魔導士）のようにルール化しておくとスムーズです。

HTML
<div>職業: 
    <button onclick="setBody('player_warrior.png')">戦士</button>
    <button onclick="setBody('player_mage.png')">魔導士</button>
    <button onclick="setBody('player_ninja.png')">忍者</button>
</div>

<div id="player-view" class="char-preview">
    <div id="aura-part" class="part" style="font-size: 80px; opacity: 0.5;"></div>
    <div id="body-part" class="part">
        <img src="player_warrior.png" id="p-img" class="pixel-img">
    </div>
</div>

<script>
    // 職業（画像）を切り替える関数
    function setBody(imgSrc) {
        const imgTag = document.getElementById('p-img');
        imgTag.src = imgSrc; // 画像のパスを書き換える
        
        // 画像読み込みエラー対策（ファイルがない場合）
        imgTag.onerror = function() {
            this.src = ""; // 画像がない時は非表示にするか、代替画像を出す
            console.error("画像ファイルが見つかりません: " + imgSrc);
        };
        
        document.getElementById('log').innerText = "装備（画像）を変更した！";
    }
</script>
