<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>MONOMONO ONLINE - ULTIMATE</title>

<style>
:root{
--accent:#6c5ce7;
}

/* 🌤 空 */
body{
background:linear-gradient(to bottom,#87cefa,#e0f7ff);
font-family:sans-serif;
margin:0;
display:flex;
justify-content:center;
}

/* レイアウト */
.game{
display:flex;
width:1000px;
gap:10px;
margin-top:20px;
}

.panel{
background:rgba(255,255,255,0.9);
padding:15px;
border-radius:10px;
}

/* 左 */
.left{width:40%}

/* 右 */
.right{width:60%}

/* ボタン */
.btn{
width:100%;
padding:8px;
margin:3px 0;
cursor:pointer;
border:1px solid #aaa;
background:white;
}

/* メニュー */
.menu-grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
}

.group{
background:#eee;
padding:10px;
border-radius:8px;
}

#log{
height:150px;
overflow:auto;
background:#000;
color:#0f0;
font-size:12px;
padding:5px;
}

.hidden{display:none}
</style>
</head>

<body>

<div id="app">

<!-- タイトル -->
<div id="start">
<h2>MONOMONO ONLINE</h2>
<button class="btn" onclick="newGame()">新規作成</button>
<button class="btn" onclick="loadList()">続きから</button>
</div>

<!-- ロード -->
<div id="load" class="hidden"></div>

<!-- 作成 -->
<div id="create" class="hidden">
<input id="name" placeholder="名前"><br>
<input type="file" id="img"><br>
<button class="btn" onclick="create()">作成</button>
</div>

<!-- ゲーム -->
<div id="game" class="hidden" class="game">

<div class="game">

<!-- 左：ステータス -->
<div class="panel left">
<h3>ステータス</h3>
<div id="status"></div>
</div>

<!-- 右：メニュー -->
<div class="panel right">
<h3>行動メニュー</h3>

<div class="menu-grid">

<div class="group">
<h4>🏙 街</h4>
<button class="btn">倉庫</button>
<button class="btn">市場</button>
<button class="btn">合成</button>
</div>

<div class="group">
<h4>⚔️ 戦闘</h4>
<button class="btn" onclick="battle()">探索</button>
<button class="btn">ランダム</button>
</div>

<div class="group">
<h4>🧪 成長</h4>
<button class="btn" onclick="jobSelect()">転職</button>
<button class="btn">ステ振り</button>
</div>

<div class="group">
<h4>💾 システム</h4>
<button class="btn" onclick="save()">セーブ</button>
<button class="btn" onclick="logout()">戻る</button>
</div>

</div>

<div id="log"></div>

</div>

</div>

</div>

<script>
const JOBS={
剣士:{hp:15,atk:15,def:10},
盾:{hp:30,atk:5,def:20},
弓:{hp:10,atk:12,crit:0.3},
魔:{hp:8,matk:20,magic:true}
};

let p=null,imgData="",curHp=0;

/* 新規 */
function newGame(){show("create")}

/* ロード一覧 */
function loadList(){
let html="";
for(let i=0;i<localStorage.length;i++){
let k=localStorage.key(i);
if(k.startsWith("mono_")){
let d=JSON.parse(localStorage.getItem(k));
html+=`
<button class="btn" onclick="load('${k}')">${d.name} Lv${d.lv}</button>
<button onclick="del('${k}')">削除</button>`;
}
}
set("load",html);
show("load");
}

/* 削除 */
function del(k){
localStorage.removeItem(k);
loadList();
}

/* ロード */
function load(k){
p=JSON.parse(localStorage.getItem(k));
curHp=p.hp*5;
imgData=p.img;
show("game");
update();
}

/* 画像 */
document.getElementById("img").onchange=e=>{
let r=new FileReader();
r.onload=v=>imgData=v.target.result;
r.readAsDataURL(e.target.files[0]);
};

/* 作成 */
function create(){
p={name:val("name"),lv:1,exp:0,gold:0,img:imgData};
jobSelect();
}

/* 職業選択 */
function jobSelect(){
let html="";
Object.keys(JOBS).forEach(j=>{
html+=`<button class="btn" onclick="setJob('${j}')">${j}</button>`;
});
set("create",html);
}

/* 決定 */
function setJob(j){
Object.assign(p,JOBS[j]);
p.job=j;
curHp=p.hp*5;
show("game");
update();
}

/* UI更新 */
function update(){
set("status",`
<img src="${imgData}" width="60"><br>
<b>${p.name}</b><br>
Lv ${p.lv} (${p.job})<br><br>

HP ${curHp}/${p.hp*5}<br>
EXP ${p.exp}/${p.lv*100}<br>
GOLD ${p.gold}<br>
`);
}

/* 戦闘 */
function battle(){
let log=document.getElementById("log");
log.innerHTML="敵出現！<br>";

let hp=30;

let loop=setInterval(()=>{
let dmg=p.magic?p.matk:p.atk;
hp-=dmg;
log.innerHTML+="攻撃 "+dmg+"<br>";

if(hp<=0){
clearInterval(loop);
log.innerHTML+="🏆 倒した！<br>";

setTimeout(()=>{
p.exp+=20;
p.gold+=20;
update();
},2000);
}
},500);
}

/* セーブ */
function save(){
p.img=imgData;
localStorage.setItem("mono_"+p.name,JSON.stringify(p));
alert("セーブしました");
}

/* 戻る */
function logout(){location.reload();}

/* util */
function show(id){
["start","load","create","game"]
.forEach(i=>document.getElementById(i).classList.add("hidden"));
document.getElementById(id).classList.remove("hidden");
}
function set(id,v){document.getElementById(id).innerHTML=v}
function val(id){return document.getElementById(id).value}
</script>

</body>
</html>
